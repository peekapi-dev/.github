<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#0a0a12"/>

  <!-- Gradient blobs -->
  <circle cx="200" cy="150" r="250" fill="#0e7490" opacity="0.15" filter="url(#blur)"/>
  <circle cx="600" cy="100" r="200" fill="#22d3ee" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1000" cy="200" r="220" fill="#0e7490" opacity="0.12" filter="url(#blur)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Logo circle -->
  <circle cx="530" cy="150" r="32" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.6"/>
  <defs>
    <radialGradient id="logoGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>
  <circle cx="530" cy="150" r="21" fill="url(#logoGrad)"/>
  <circle cx="530" cy="150" r="11" stroke="white" stroke-width="0.7" stroke-opacity="0.25" fill="none"/>
  <circle cx="525" cy="145" r="4.5" fill="white" opacity="0.6"/>

  <!-- Text -->
  <text x="575" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="-0.5">PeekAPI</text>
</svg>
